name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Перевірка Бекенду (NestJS)
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./event-app-backend # Вкажіть шлях до папки бекенду
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm run lint
      - run: pnpm run test
      - run: pnpm run build

  # Перевірка Фронтенду (React)
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./react-app-folder # Вкажіть назву вашої папки з React
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20' # Для React часто ставлять 20-ту (LTS)
          cache: 'pnpm'
      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm run lint # Переконайтеся, що в React є скрипт lint
      - run: pnpm run build
