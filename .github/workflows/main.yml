name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Перевірка Бекенду (NestJS)
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: . # Якщо package.json лежить в корені
    steps:
      - uses: actions/checkout@v4 # Копіює ваш код на сервер (без цього не буде файлів)
      - uses: actions/setup-node@v4
        with:
          node-version: '22' # Згідно з вашим package.json
          cache: 'pnpm'

      - name: Install & Check
        run: |
          npm install -g pnpm
          pnpm install
          pnpm run lint   # Перевірка стилю коду
          pnpm run test   # Запуск юніт-тестів
          pnpm run build  # Перевірка, чи збирається проєкт

  # Перевірка Фронтенду (React)
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./react-folder # ПІДСТАВТЕ НАЗВУ ВАШОЇ ПАПКИ
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install & Check
        run: |
          npm install -g pnpm
          pnpm install
          # Додайте команди, які є у вашому React package.json (наприклад: pnpm run build)
